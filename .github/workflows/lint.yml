name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          # Collect files by extension (.yaml / .yml)
          mapfile -d '' yaml_files < <(
            find . \
              \( -name '.git' -prune \) -o \
              \( -name '*.yaml' -o -name '*.yml' \) \
              -type f -print0
          )

          if [[ ${#yaml_files[@]} -eq 0 ]]; then
            echo "No YAML files found."
            exit 0
          fi

          echo "Linting ${#yaml_files[@]} YAML file(s):"
          printf '  %s\n' "${yaml_files[@]}"
          yamllint -d '{extends: default, rules: {line-length: {max: 120}}}' \
            "${yaml_files[@]}"

  json:
    name: JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          fail=0

          # Files identified by extension (.json only; .json.tmpl handled by the templates job)
          while IFS= read -r -d '' file; do
            if ! jq empty < "$file" 2>/tmp/jq_err; then
              echo "FAIL: $file"
              cat /tmp/jq_err
              fail=1
            else
              echo "OK:   $file"
            fi
          done < <(find . \( -name '.git' -prune \) -o \
            -name '*.json' -not -name '*.json.tmpl' \
            -type f -print0)

          # Files identified by path prefix (no extension but known JSON locations)
          # Currently none in this repo; extend here if that changes.

          exit "$fail"

  templates:
    name: Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: |
          curl -fsLS https://chezmoi.io/get | sh -s -- -b /usr/local/bin

      - name: Validate template syntax and JSON structure
        run: |
          # scripts/validate-templates.go uses Go's text/template parser (the
          # same engine chezmoi uses internally) to check syntax without
          # executing templates. This means 1Password and other external calls
          # are never made, so the job is safe to run in CI without secrets.
          #
          # For .json.tmpl files it additionally strips template directives and
          # validates the remaining JSON skeleton with encoding/json.

          mapfile -d '' tmpl_files < <(
            find . \( -name '.git' -prune \) -o \
              -name '*.tmpl' -type f -print0
          )

          if [[ ${#tmpl_files[@]} -eq 0 ]]; then
            echo "No template files found."
            exit 0
          fi

          echo "Validating ${#tmpl_files[@]} template file(s):"
          printf '  %s\n' "${tmpl_files[@]}"

          go run scripts/validate-templates.go "${tmpl_files[@]}"

  shell:
    name: Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          fail=0

          check() {
            local file="$1" shell="$2"
            if ! shellcheck -s "$shell" -e SC1090,SC1091 "$file"; then
              fail=1
            fi
          }

          # --- By extension ---
          while IFS= read -r -d '' file; do
            case "$file" in
              *.bash) check "$file" bash ;;
              *.sh)   check "$file" sh   ;;
              *.zsh)  check "$file" bash ;; # shellcheck has no zsh dialect; bash is closest
            esac
          done < <(find . \( -name '.git' -prune \) -o \
            \( -name '*.sh' -o -name '*.bash' -o -name '*.zsh' \) \
            -type f -print0)

          # --- By path prefix ---

          # shell.d/ — modular env/alias fragments, treated as sh
          while IFS= read -r -d '' file; do
            check "$file" sh
          done < <(find ./shell.d \( -name '*.tmpl' -prune \) -o \
            -type f -print0)

          # osx/ — macOS helper scripts, treated as sh
          while IFS= read -r -d '' file; do
            # skip non-shell files that may land here
            case "$file" in
              *.sh|*.bash) check "$file" sh ;;
            esac
          done < <(find ./osx -type f -print0 2>/dev/null)

          # dot_zsh/ — zsh scripts (no extension in some cases)
          while IFS= read -r -d '' file; do
            case "$file" in
              *.tmpl) continue ;;  # skip chezmoi templates
            esac
            check "$file" bash
          done < <(find ./dot_zsh -type f -print0 2>/dev/null)

          exit "$fail"
