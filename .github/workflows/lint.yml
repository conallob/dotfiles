name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  yaml:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          # Collect files by extension (.yaml / .yml)
          mapfile -d '' yaml_files < <(
            find . \
              \( -name '.git' -prune \) -o \
              \( -name '*.yaml' -o -name '*.yml' \) \
              -type f -print0
          )

          if [[ ${#yaml_files[@]} -eq 0 ]]; then
            echo "No YAML files found."
            exit 0
          fi

          echo "Linting ${#yaml_files[@]} YAML file(s):"
          printf '  %s\n' "${yaml_files[@]}"
          yamllint -c .yamllint.yml "${yaml_files[@]}"

  json:
    name: JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          fail=0

          # Files identified by extension (.json only; .json.tmpl handled by the templates job)
          while IFS= read -r -d '' file; do
            if ! jq empty < "$file" 2>/tmp/jq_err; then
              echo "FAIL: $file"
              cat /tmp/jq_err
              fail=1
            else
              echo "OK:   $file"
            fi
          done < <(find . \( -name '.git' -prune \) -o \
            -name '*.json' -not -name '*.json.tmpl' \
            -type f -print0)

          # Files identified by path prefix (no extension but known JSON locations)
          # Currently none in this repo; extend here if that changes.

          exit "$fail"

  templates:
    name: Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: curl -fsLS https://chezmoi.io/get | sh -s -- -b /usr/local/bin

      - name: Set up chezmoi config and mock 1Password CLI
        run: |
          # Minimal chezmoi config: set sourceDir so includeTemplate resolves
          # relative paths, and provide stub data variables for templates.
          mkdir -p ~/.config/chezmoi
          printf '[chezmoi]\n  sourceDir = "%s"\n[data]\n' "$GITHUB_WORKSPACE" \
            > ~/.config/chezmoi/chezmoi.toml

          # Put the mock op binary ahead of any real op on PATH so chezmoi's
          # onepasswordDetailsFields / onepasswordDocument functions get stubs.
          cp scripts/mock-op /usr/local/bin/op
          chmod +x /usr/local/bin/op

      - name: Render and validate templates
        run: |
          fail=0

          validate_template() {
            local file="$1"
            local rendered first_char validate_json
            if ! rendered=$(chezmoi --source "$(pwd)" execute-template < "$file" 2>/tmp/tmpl_err); then
              echo "FAIL (render): $file"
              cat /tmp/tmpl_err
              fail=1
              return
            fi

            # For JSON templates, also validate the rendered output is valid JSON.
            case "$file" in
              *modify_*.json.tmpl)
                # Modify scripts render as shell scripts, not JSON — skip JSON validation.
                echo "OK    $file"
                ;;
              *.json.tmpl)
                if [[ -z "$rendered" ]]; then
                  echo "OK    $file"
                else
                  first_char=$(printf '%s' "$rendered" | tr -d '[:space:]' | head -c1)
                  if [[ "$first_char" == '{' || "$first_char" == '[' ]]; then
                    validate_json="$rendered"
                  else
                    # JSON object fragment (key:value pairs without enclosing braces),
                    # used as an includeTemplate partial — wrap before validating.
                    validate_json="{ $rendered }"
                  fi
                  if ! echo "$validate_json" | jq empty 2>/tmp/jq_err; then
                    echo "FAIL (json):   $file"
                    cat /tmp/jq_err
                    fail=1
                  else
                    echo "OK    $file"
                  fi
                fi
                ;;
              *)
                echo "OK    $file"
                ;;
            esac
          }

          mapfile -d '' tmpl_files < <(
            find . \( -name '.git' -prune \) -o \
              -name '*.tmpl' -type f -print0
          )

          if [[ ${#tmpl_files[@]} -eq 0 ]]; then
            echo "No template files found."
            exit 0
          fi

          echo "Rendering ${#tmpl_files[@]} template file(s):"
          printf '  %s\n' "${tmpl_files[@]}"
          echo

          for file in "${tmpl_files[@]}"; do
            validate_template "$file"
          done

          exit "$fail"

  shell:
    name: Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          fail=0

          check() {
            local file="$1" shell="$2"
            if ! shellcheck -s "$shell" -e SC1090,SC1091 "$file"; then
              fail=1
            fi
          }

          # --- By extension ---
          while IFS= read -r -d '' file; do
            case "$file" in
              *.bash) check "$file" bash ;;
              *.sh)
                # Use bash dialect for scripts with a bash shebang (e.g. CI helpers).
                if head -1 "$file" 2>/dev/null | grep -q bash; then
                  check "$file" bash
                else
                  check "$file" sh
                fi
                ;;
              *.zsh)
                case "$file" in
                  *dot_p10k*) ;;  # p10k config uses zsh-only anonymous functions
                  *) check "$file" bash ;;  # no zsh dialect; bash is closest
                esac
                ;;
            esac
          done < <(find . \( -name '.git' -prune \) -o \
            \( -name '*.sh' -o -name '*.bash' -o -name '*.zsh' \) \
            -type f -print0)

          # --- By path prefix ---

          # shell.d/ — modular env/alias fragments, treated as sh
          while IFS= read -r -d '' file; do
            check "$file" sh
          done < <(find ./shell.d \( -name '*.tmpl' -prune \) -o \
            -type f -print0)

          # osx/ — macOS helper scripts, treated as sh
          while IFS= read -r -d '' file; do
            # skip non-shell files that may land here
            case "$file" in
              *.sh|*.bash) check "$file" sh ;;
            esac
          done < <(find ./osx -type f -print0 2>/dev/null)

          # dot_zsh/ — zsh scripts (no extension in some cases)
          while IFS= read -r -d '' file; do
            case "$file" in
              *.tmpl) continue ;;  # skip chezmoi templates
            esac
            check "$file" bash
          done < <(find ./dot_zsh -type f -print0 2>/dev/null)

          exit "$fail"

  # ── Vimscript syntax + antipattern checks ──────────────────────────────────
  vimrc:
    name: vimrc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install vim
        run: sudo apt-get install -y --no-install-recommends vim

      - name: Syntax check (source with vim-plug stubs)
        run: |
          # Generate a wrapper that stubs vim-plug before sourcing the real vimrc.
          # vim-plug's plug#begin / plug#end / Plug commands are not installed in CI.
          # plug#end also normally enables filetype/syntax, so we replicate that.
          cat > /tmp/vimrc_check.vim << EOF
          function! plug#begin(...) abort
          endfunction
          function! plug#end() abort
            filetype plugin indent on
            syntax on
          endfunction
          command! -nargs=+ Plug :
          try
            source $GITHUB_WORKSPACE/dot_vim/vimrc
          catch
            echoerr v:exception
            cquit
          endtry
          qall!
          EOF

          # -e: ex mode  -s: silent  --not-a-term: suppress terminal warnings
          # -u NONE: no init file  --noplugin: skip system plugins
          output=$(vim -e -s --not-a-term -u NONE --noplugin \
            -S /tmp/vimrc_check.vim 2>&1 || true)

          errors=$(printf '%s\n' "$output" \
            | grep -v '^$' \
            | grep -v '^Vim: Warning:' \
            || true)

          if [ -n "$errors" ]; then
            echo "vim reported errors when sourcing vimrc:"
            echo "$errors"
            exit 1
          fi
          echo "OK: vimrc loaded without errors"

      - name: Antipattern checks
        run: bash .github/scripts/check-vimrc-patterns.sh dot_vim/vimrc

  # ── UltiSnips snippet structure ────────────────────────────────────────────
  snippets:
    name: UltiSnips snippets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate snippet structure
        run: python3 .github/scripts/check-snippets.py dot_vim/UltiSnips
